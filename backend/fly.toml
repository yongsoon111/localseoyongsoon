# Fly.io 배포 설정
app = "localseoyongsoon-backend"
primary_region = "nrt" # Tokyo (한국과 가까움)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.concurrency]]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

# Free tier: 256MB RAM × 3 VMs
[[vm]]
  memory = "1gb"  # 병렬 처리를 위해 1GB 권장
  cpu_kind = "shared"
  cpus = 1
